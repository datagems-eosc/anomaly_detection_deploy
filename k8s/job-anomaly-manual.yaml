# Anomaly Detector Manual Job
# 手动触发异常检测
# 使用: kubectl apply -f job-anomaly-manual.yaml
# 查看日志: kubectl logs -f job/anomaly-manual -n upcite
apiVersion: batch/v1
kind: Job
metadata:
  name: anomaly-manual
  namespace: upcite
  labels:
    app: anomaly-detector
    type: manual
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: anomaly-detector
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - srv-prj-dg-k8s-worker01
                - srv-prj-dg-k8s-worker02
      containers:
      - name: anomaly-detector
        image: ghcr.io/amy-77/stream-detection:v1
        imagePullPolicy: Always
        command:
        - python
        - -u
        - /opt/datagems-runner/run_anomaly.py
        - anomaly_detector.py
        - --end
        - "NOW"
        - --window
        - "168"
        - --comprehensive
        env:
        - name: POSTGRES_DB
          value: ds_weather_stream
        - name: PGCONNECT_TIMEOUT
          value: "10"
        - name: PGCONNECT_RETRIES
          value: "6"
        - name: PGCONNECT_RETRY_DELAY
          value: "5"
        envFrom:
        - secretRef:
            name: anomaly-detector-secrets
        volumeMounts:
        - name: anomaly-runner
          mountPath: /opt/datagems-runner
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: anomaly-runner
        configMap:
          name: anomaly-runner
