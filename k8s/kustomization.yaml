# Kustomization for Weather Stream Detection
# 使用: kubectl apply -k k8s/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: upcite

resources:
  - configmap-anomaly-runner.yaml
  - deployment-collector.yaml
  - cronjob-anomaly-detector.yaml
  - cronjob-health-check.yaml

# 如果需要修改镜像地址，在这里配置
# images:
#   - name: <REGISTRY>/<PROJECT>/stream-detection
#     newName: your-registry/your-project/stream-detection
#     newTag: v1.0.0

labels:
  - pairs:
      project: datagems
      team: weather-stream
    includeSelectors: false
    includeTemplates: true
