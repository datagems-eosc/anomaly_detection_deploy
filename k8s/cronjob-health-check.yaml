# Long-term Health Check CronJob
# 每天执行一次传感器健康检查
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sensor-health-check
  namespace: upcite
  labels:
    app: sensor-health-check
    component: monitoring
spec:
  schedule: "0 8 * * *"  # 每天早上8点执行
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: sensor-health-check
        spec:
          restartPolicy: Never
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                    - srv-prj-dg-k8s-worker01
                    - srv-prj-dg-k8s-worker02
          containers:
          - name: health-checker
            image: ghcr.io/amy-77/stream-detection:v1
            imagePullPolicy: Always
            command:
            - python
            - -u
            - /opt/datagems-runner/run_anomaly.py
            - anomaly_detector.py
            - --health-check
            - --days
            - "30"
            - --output-json
            - /tmp/health_report.json
            env:
            - name: POSTGRES_DB
              value: ds_weather_stream
            - name: PGCONNECT_TIMEOUT
              value: "10"
            - name: PGCONNECT_RETRIES
              value: "6"
            - name: PGCONNECT_RETRY_DELAY
              value: "5"
            envFrom:
            - secretRef:
                name: anomaly-detector-secrets
            volumeMounts:
            - name: anomaly-runner
              mountPath: /opt/datagems-runner
              readOnly: true
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: anomaly-runner
            configMap:
              name: anomaly-runner
